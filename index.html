<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Alon's Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0e;
    --surface: #1a1917;
    --surface2: #222220;
    --surface3: #2a2a27;
    --border: #2e2e2a;
    --border2: #3a3a35;
    --text: #e8e4db;
    --muted: #7a7670;
    --muted2: #5a5652;
    --accent: #c8a96e;
    --accent-dim: #8a7248;
    --accent-light: #2a2218;
    --green: #4a9e6e;
    --green-dim: #1e3828;
    --green-light: #a8d8b8;
    --red: #c05040;
    --blue: #4a7eb8;
    --blue-dim: #1a2a3e;
    --radius: 12px;
    --radius-sm: 7px;
    --mono: 'Geist Mono', monospace;
    --serif: 'Instrument Serif', serif;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; max-width: 520px; margin: 0 auto; }

  /* HEADER */
  .header { padding: 28px 20px 0; }
  .date-line { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
  .page-title { font-family: var(--serif); font-size: 36px; color: var(--text); font-style: italic; line-height: 1; margin-bottom: 20px; }

  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin: 0 20px; }
  .tab { padding: 10px 16px; border: none; background: transparent; font-family: var(--sans); font-size: 13px; font-weight: 400; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; white-space: nowrap; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

  .content { padding: 20px; }
  .view { display: none; }
  .view.active { display: block; }

  /* ADD TASK */
  .add-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 20px; }
  .add-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .add-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; font-family: var(--sans); font-size: 14px; color: var(--text); outline: none; transition: border 0.15s; }
  .add-input::placeholder { color: var(--muted2); }
  .add-input:focus { border-color: var(--accent-dim); }
  .add-btn { background: var(--accent); color: var(--bg); border: none; border-radius: var(--radius-sm); padding: 9px 16px; font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: opacity 0.15s; }
  .add-btn:hover { opacity: 0.85; }
  .when-toggle { display: flex; gap: 6px; }
  .when-btn { flex: 1; padding: 7px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--mono); font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; text-align: center; color: var(--muted); background: var(--surface2); transition: all 0.15s; }
  .when-btn.sel-today { background: var(--accent-light); color: var(--accent); border-color: var(--accent-dim); }
  .when-btn.sel-next { background: var(--blue-dim); color: #7aaad4; border-color: #2a4a6e; }
  .when-btn.sel-house { background: #1e2e1e; color: #6abf6a; border-color: #3a6e3a; }

  /* TASK SECTIONS */
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .section-label { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .section-count { font-family: var(--mono); font-size: 10px; color: var(--muted2); }
  .tasks { display: flex; flex-direction: column; gap: 6px; margin-bottom: 24px; }

  /* TASK ITEM */
  .task { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; align-items: flex-start; gap: 10px; transition: all 0.2s; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
  .task:hover { border-color: var(--border2); }
  .task.done { opacity: 0.45; }
  .task.done .task-text { text-decoration: line-through; color: var(--muted); }

  .check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 1px; position: relative; transition: all 0.15s; }
  .check.checked { background: var(--green); border-color: var(--green); }
  .check.checked::after { content:''; position:absolute; top:4px; left:6px; width:4px; height:7px; border:1.5px solid white; border-top:none; border-left:none; transform:rotate(45deg); }

  .task-body { flex: 1; min-width: 0; }
  .task-text { font-size: 14px; line-height: 1.4; word-break: break-word; }
  .task-meta { display: flex; gap: 8px; margin-top: 5px; align-items: center; flex-wrap: wrap; }
  .task-tag { font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.3px; }
  .tag-today { background: var(--accent-light); color: var(--accent); }
  .tag-next { background: var(--blue-dim); color: #7aaad4; }
  .task-remark { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 4px; }
  .task-date { font-family: var(--mono); font-size: 10px; color: var(--muted2); }

  .task-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
  .task:hover .task-actions { opacity: 1; }
  .act-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 13px; padding: 3px 5px; border-radius: 4px; transition: all 0.15s; line-height: 1; }
  .act-btn:hover { background: var(--surface2); color: var(--text); }
  .act-btn.move { font-size: 11px; font-family: var(--mono); }

  /* COMPLETE MODAL */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 20px; width: 100%; max-width: 360px; }
  .modal-title { font-family: var(--serif); font-size: 20px; font-style: italic; margin-bottom: 4px; }
  .modal-task { font-size: 13px; color: var(--muted); margin-bottom: 16px; border-left: 2px solid var(--accent-dim); padding-left: 10px; }
  .modal-label { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .modal-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; font-family: var(--sans); font-size: 14px; color: var(--text); outline: none; resize: none; margin-bottom: 14px; }
  .modal-input:focus { border-color: var(--accent-dim); }
  .modal-btns { display: flex; gap: 8px; }
  .modal-cancel { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; font-family: var(--sans); font-size: 14px; color: var(--muted); cursor: pointer; }
  .modal-confirm { flex: 2; background: var(--green); border: none; border-radius: var(--radius-sm); padding: 10px; font-family: var(--sans); font-size: 14px; font-weight: 500; color: white; cursor: pointer; transition: opacity 0.15s; }
  .modal-confirm:hover { opacity: 0.85; }

  /* NOTES */
  .notes-area { width: 100%; min-height: 300px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; font-family: var(--sans); font-size: 14px; color: var(--text); outline: none; resize: none; line-height: 1.7; }
  .notes-area::placeholder { color: var(--muted2); }
  .notes-area:focus { border-color: var(--border2); }
  .notes-save-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .notes-status { font-family: var(--mono); font-size: 11px; color: var(--muted2); }
  .notes-save { background: var(--accent); color: var(--bg); border: none; border-radius: var(--radius-sm); padding: 8px 18px; font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .notes-save:hover { opacity: 0.85; }

  /* NOTES */
  .note-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; transition: border 0.15s; }
  .note-card:hover { border-color: var(--border2); }
  .note-card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .note-card-body { font-size: 13px; color: var(--muted); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .note-card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .note-card-date { font-family: var(--mono); font-size: 10px; color: var(--muted2); }
  .note-card-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
  .note-card:hover .note-card-actions { opacity: 1; }

  /* SUBTASKS */
  .subtasks { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; padding-left: 28px; }
  .subtask { display: flex; align-items: center; gap: 8px; }
  .sub-check { width: 15px; height: 15px; border-radius: 3px; border: 1.5px solid var(--border2); background: transparent; cursor: pointer; flex-shrink: 0; position: relative; transition: all 0.15s; }
  .sub-check.checked { background: var(--green); border-color: var(--green); }
  .sub-check.checked::after { content:''; position:absolute; top:2px; left:4px; width:3px; height:6px; border:1.5px solid white; border-top:none; border-left:none; transform:rotate(45deg); }
  .sub-text { font-size: 12px; color: var(--muted); flex: 1; }
  .sub-text.done { text-decoration: line-through; color: var(--muted2); }
  .sub-del { background: none; border: none; cursor: pointer; color: var(--muted2); font-size: 11px; padding: 2px 4px; opacity: 0; transition: opacity 0.15s; }
  .subtask:hover .sub-del { opacity: 1; }
  .add-subtask-row { display: flex; gap: 6px; margin-top: 6px; padding-left: 28px; }
  .sub-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 5px 9px; font-family: var(--sans); font-size: 12px; color: var(--text); outline: none; }
  .sub-input::placeholder { color: var(--muted2); }
  .sub-input:focus { border-color: var(--accent-dim); }
  .sub-add-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 5px 10px; font-size: 12px; color: var(--muted); cursor: pointer; white-space: nowrap; }
  .sub-add-btn:hover { color: var(--text); }
  .subtask-toggle { font-family: var(--mono); font-size: 10px; color: var(--muted2); cursor: pointer; margin-top: 5px; padding-left: 28px; display: block; }
  .subtask-toggle:hover { color: var(--muted); }
  .subtask-progress { font-family: var(--mono); font-size: 10px; color: var(--accent-dim); margin-top: 3px; }
  /* ORDER BUTTONS */
  .order-btns { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
  .task:hover .order-btns { opacity: 1; }
  .ord-btn { background: none; border: none; cursor: pointer; color: var(--muted2); font-size: 10px; padding: 1px 3px; line-height: 1; border-radius: 3px; }
  .ord-btn:hover { background: var(--surface2); color: var(--text); }
  .ord-btn:disabled { opacity: 0.2; cursor: default; }

  /* HISTORY */
  .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; }
  .history-text { font-size: 14px; line-height: 1.4; margin-bottom: 6px; }
  .history-meta { display: flex; gap: 12px; align-items: center; }
  .history-date { font-family: var(--mono); font-size: 11px; color: var(--green-light); }
  .history-remark { font-size: 12px; color: var(--muted); font-style: italic; }

  /* EMPTY */
  .empty { text-align: center; padding: 32px 20px; color: var(--muted2); }
  .empty-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.5; }
  .empty p { font-size: 13px; }

  /* MOVE BTN tooltip */
  .move-tip { font-size: 10px; }

  /* RECURRING */
  .rec-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .rec-icon { font-size: 16px; flex-shrink: 0; color: var(--accent); }
  .rec-body { flex: 1; min-width: 0; }
  .rec-text { font-size: 14px; font-weight: 500; }
  .rec-meta { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 3px; }
  .rec-next { font-family: var(--mono); font-size: 10px; color: var(--accent-dim); margin-top: 2px; }
  .rec-del { background: none; border: none; cursor: pointer; color: var(--muted2); font-size: 14px; padding: 4px; opacity: 0; transition: opacity 0.15s; }
  .rec-item:hover .rec-del { opacity: 1; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--surface3); border: 1px solid var(--border2); color: var(--text); padding: 9px 18px; border-radius: 30px; font-size: 13px; transition: transform 0.3s ease; z-index: 999; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="date-line" id="date-line"></div>
  <div class="page-title">My Tasks</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('tasks',this)">Tasks</button>
  <button class="tab" onclick="switchTab('history',this)">Completed</button>
  <button class="tab" onclick="switchTab('recurring',this)">↻ Recurring</button>
  <button class="tab" onclick="switchTab('notes',this)">Notes</button>
</div>

<div class="content">

  <!-- TASKS -->
  <div id="view-tasks" class="view active">
    <div class="add-box">
      <div class="add-row">
        <input class="add-input" id="task-input" placeholder="New task..." onkeydown="if(event.key==='Enter')addTask()">
        <button class="add-btn" onclick="addTask()">Add</button>
      </div>
      <div class="when-toggle">
        <button class="when-btn sel-today" id="when-today" onclick="selectWhen('today')">Current</button>
        <button class="when-btn" id="when-next" onclick="selectWhen('next')">Future</button>
        <button class="when-btn" id="when-house" onclick="selectWhen('house')">🏠 בית</button>
      </div>
    </div>

    <div class="section-head">
      <span class="section-label">Current</span>
      <span class="section-count" id="count-today">0 tasks</span>
    </div>
    <div class="tasks" id="tasks-today"></div>

    <div class="section-head">
      <span class="section-label">Future</span>
      <span class="section-count" id="count-next">0 tasks</span>
    </div>
    <div class="tasks" id="tasks-next"></div>

    <div class="section-head">
      <span class="section-label">🏠 בית</span>
      <span class="section-count" id="count-house">0 tasks</span>
    </div>
    <div class="tasks" id="tasks-house"></div>
  </div>

  <!-- HISTORY -->
  <div id="view-history" class="view">
    <div id="history-list"></div>
  </div>

  <!-- RECURRING -->
  <div id="view-recurring" class="view">
    <div class="add-box">
      <div class="add-row">
        <input class="add-input" id="rec-input" placeholder="e.g. Pay tax..." onkeydown="if(event.key==='Enter')addRecurring()">
        <button class="add-btn" onclick="addRecurring()">Add</button>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
        <select class="add-input" id="rec-freq" style="flex:1;min-width:100px" onchange="updateRecurringUI()">
          <option value="monthly">Monthly</option>
          <option value="weekly">Weekly</option>
        </select>
        <select class="add-input" id="rec-day" style="flex:1;min-width:100px"></select>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <select class="add-input" id="rec-section" style="flex:1">
          <option value="today">→ Current</option>
          <option value="next">→ Future</option>
          <option value="house">→ 🏠 בית</option>
        </select>
      </div>
    </div>
    <div class="section-head">
      <span class="section-label">Recurring tasks</span>
      <span class="section-count" id="count-recurring">0</span>
    </div>
    <div id="recurring-list"></div>
    <div style="margin-top:16px;font-family:var(--mono);font-size:10px;color:var(--muted2);line-height:1.6">
      Each recurring task auto-appears in your task list on its due date and stays until you complete it.
    </div>
  </div>

  <!-- NOTES -->
  <div id="view-notes" class="view">
    <div class="add-box">
      <div class="add-row">
        <input class="add-input" id="note-title-input" placeholder="Note title (optional)..." style="margin-bottom:8px">
      </div>
      <textarea class="add-input" id="note-body-input" rows="3" placeholder="Write your note..." style="resize:none;width:100%;margin-bottom:8px"></textarea>
      <button class="add-btn" style="width:100%" onclick="saveNewNote()">+ Add Note</button>
    </div>
    <div class="section-head">
      <span class="section-label">Notes</span>
      <span class="section-count" id="count-notes">0</span>
    </div>
    <div id="notes-list"></div>
  </div>

</div>

<!-- COMPLETE MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-title">Mark as done</div>
    <div class="modal-task" id="modal-task-name"></div>
    <div class="modal-label">Remarks (optional)</div>
    <textarea class="modal-input" id="modal-remark" rows="3" placeholder="Any notes about this task..."></textarea>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmComplete()">Mark complete</button>
    </div>
  </div>
</div>

<!-- NOTE EDIT MODAL -->
<div class="modal-bg" id="note-modal-bg">
  <div class="modal">
    <div class="modal-title">Edit Note</div>
    <input class="modal-input" id="note-edit-title" placeholder="Title (optional)..." style="margin-bottom:10px">
    <textarea class="modal-input" id="note-edit-body" rows="5" placeholder="Note content..."></textarea>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeNoteModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmEditNote()">Save</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, setDoc, getDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDgikNn60xspZmPf_Lp4SzXQwvsjhV50OM",
  authDomain: "super-list-ad2f7.firebaseapp.com",
  projectId: "super-list-ad2f7",
  storageBucket: "super-list-ad2f7.firebasestorage.app",
  messagingSenderId: "337078022846",
  appId: "1:337078022846:web:397438abf56b9939ff64ef"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let tasks = [], selectedWhen = 'today', pendingCompleteId = null;

// Date header
const now = new Date();
document.getElementById('date-line').textContent = now.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

// Real-time listeners
onSnapshot(query(collection(db,'tasks'), orderBy('createdAt','asc')), snap => {
  tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderTasks();
});

onSnapshot(query(collection(db,'completed'), orderBy('completedAt','desc')), snap => {
  const completed = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderHistory(completed);
});

// Load notes
getDoc(doc(db,'config','notes')).then(snap => {
  if (snap.exists()) document.getElementById('notes-area').value = snap.data().content || '';
});

// ---- TASKS ----
window.selectWhen = function(when) {
  selectedWhen = when;
  document.getElementById('when-today').className = 'when-btn' + (when==='today' ? ' sel-today' : '');
  document.getElementById('when-next').className  = 'when-btn' + (when==='next'  ? ' sel-next'  : '');
  document.getElementById('when-house').className = 'when-btn' + (when==='house' ? ' sel-house' : '');
};

window.addTask = async function() {
  const input = document.getElementById('task-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  // Find max order in current section
  const sectionTasks = tasks.filter(t => t.when === selectedWhen);
  const maxOrder = sectionTasks.length ? Math.max(...sectionTasks.map(t => t.order || 0)) : 0;
  await addDoc(collection(db,'tasks'), { text, when: selectedWhen, order: maxOrder + 1, subtasks: [], createdAt: serverTimestamp() });
  showToast('Task added');
};

window.startComplete = function(id) {
  const task = tasks.find(t => t.id === id); if (!task) return;
  pendingCompleteId = id;
  document.getElementById('modal-task-name').textContent = task.text;
  document.getElementById('modal-remark').value = '';
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('modal-remark').focus(), 100);
};

window.closeModal = function() {
  document.getElementById('modal-bg').classList.remove('open');
  pendingCompleteId = null;
};

window.confirmComplete = async function() {
  if (!pendingCompleteId) return;
  const task = tasks.find(t => t.id === pendingCompleteId); if (!task) return;
  const remark = document.getElementById('modal-remark').value.trim();
  const completedAt = new Date();
  await addDoc(collection(db,'completed'), {
    text: task.text,
    remark: remark || '',
    completedAt: serverTimestamp(),
    completedDate: completedAt.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }),
    when: task.when
  });
  await deleteDoc(doc(db,'tasks', pendingCompleteId));
  closeModal();
  showToast('Task completed ✓');
};

window.deleteTask = async function(id) {
  await deleteDoc(doc(db,'tasks', id));
  showToast('Task removed');
};

window.moveTaskOrder = async function(id, dir) {
  const task = tasks.find(t => t.id === id); if (!task) return;
  const section = tasks.filter(t => t.when === task.when).sort((a,b) => (a.order||0)-(b.order||0));
  const idx = section.findIndex(t => t.id === id);
  const swapIdx = dir === 'up' ? idx - 1 : idx + 1;
  if (swapIdx < 0 || swapIdx >= section.length) return;
  const swapTask = section[swapIdx];
  const orderA = task.order || 0, orderB = swapTask.order || 0;
  await updateDoc(doc(db,'tasks', id), { order: orderB });
  await updateDoc(doc(db,'tasks', swapTask.id), { order: orderA });
};

window.addSubtask = async function(taskId) {
  const input = document.getElementById('sub-input-' + taskId);
  const text = input.value.trim(); if (!text) return;
  input.value = '';
  const task = tasks.find(t => t.id === taskId); if (!task) return;
  const subs = task.subtasks || [];
  subs.push({ id: Date.now().toString(), text, done: false });
  await updateDoc(doc(db,'tasks', taskId), { subtasks: subs });
};

window.toggleSubtask = async function(taskId, subId) {
  const task = tasks.find(t => t.id === taskId); if (!task) return;
  const subs = (task.subtasks || []).map(s => s.id === subId ? {...s, done: !s.done} : s);
  await updateDoc(doc(db,'tasks', taskId), { subtasks: subs });
};

window.deleteSubtask = async function(taskId, subId) {
  const task = tasks.find(t => t.id === taskId); if (!task) return;
  const subs = (task.subtasks || []).filter(s => s.id !== subId);
  await updateDoc(doc(db,'tasks', taskId), { subtasks: subs });
};

window.toggleSubtaskSection = function(taskId) {
  const el = document.getElementById('subs-' + taskId);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
};

window.moveTask = async function(id, to) {
  await updateDoc(doc(db,'tasks', id), { when: to });
  const labels = { today: 'Current', next: 'Future', house: '🏠 בית' };
  showToast(`Moved to ${labels[to]}`);
};

function fmt(ts) {
  if (!ts) return '';
  return ts.toDate ? ts.toDate().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }) : '';
}

function renderTasks() {
  const sortByOrder = arr => [...arr].sort((a,b) => (a.order||0)-(b.order||0));
  const today = sortByOrder(tasks.filter(t => t.when === 'today'));
  const next  = sortByOrder(tasks.filter(t => t.when === 'next'));
  const house = sortByOrder(tasks.filter(t => t.when === 'house'));

  document.getElementById('count-today').textContent = today.length + ' task' + (today.length!==1?'s':'');
  document.getElementById('count-next').textContent  = next.length  + ' task' + (next.length!==1?'s':'');
  document.getElementById('count-house').textContent = house.length + ' task' + (house.length!==1?'s':'');

  document.getElementById('tasks-today').innerHTML = today.length
    ? today.map((t,i) => renderTask(t, i, today.length)).join('')
    : `<div class="empty"><div class="empty-icon">◦</div><p>No current tasks</p></div>`;

  document.getElementById('tasks-next').innerHTML = next.length
    ? next.map((t,i) => renderTask(t, i, next.length)).join('')
    : `<div class="empty"><div class="empty-icon">◦</div><p>No future tasks</p></div>`;

  document.getElementById('tasks-house').innerHTML = house.length
    ? house.map((t,i) => renderTask(t, i, house.length)).join('')
    : `<div class="empty"><div class="empty-icon">🏠</div><p>No house tasks</p></div>`;
}

function renderTask(t, idx, total) {
  const moveLabel = t.when === 'today' ? '→ Future' : t.when === 'next' ? '→ Current' : '→ Current';
  const moveTo    = t.when === 'today' ? 'next' : 'today';
  const subs = t.subtasks || [];
  const doneSubs = subs.filter(s => s.done).length;
  const subProgress = subs.length ? `<span class="subtask-progress">${doneSubs}/${subs.length} subtasks</span>` : '';
  const subsHtml = subs.map(s => `
    <div class="subtask">
      <button class="sub-check ${s.done?'checked':''}" onclick="toggleSubtask('${t.id}','${s.id}')"></button>
      <span class="sub-text ${s.done?'done':''}">${escHtml(s.text)}</span>
      <button class="sub-del" onclick="deleteSubtask('${t.id}','${s.id}')">✕</button>
    </div>`).join('');

  return `<div class="task" id="task-${t.id}">
    <div class="order-btns">
      <button class="ord-btn" onclick="moveTaskOrder('${t.id}','up')" ${idx===0?'disabled':''}>▲</button>
      <button class="ord-btn" onclick="moveTaskOrder('${t.id}','down')" ${idx===total-1?'disabled':''}>▼</button>
    </div>
    <button class="check" onclick="startComplete('${t.id}')"></button>
    <div class="task-body">
      <div class="task-text">${escHtml(t.text)}</div>
      ${subProgress}
      <div id="subs-${t.id}">
        ${subs.length ? `<div class="subtasks">${subsHtml}</div>` : ''}
        <div class="add-subtask-row">
          <input class="sub-input" id="sub-input-${t.id}" placeholder="Add subtask..." onkeydown="if(event.key==='Enter')addSubtask('${t.id}')">
          <button class="sub-add-btn" onclick="addSubtask('${t.id}')">+ Sub</button>
        </div>
      </div>
    </div>
    <div class="task-actions">
      <button class="act-btn move" onclick="moveTask('${t.id}','${moveTo}')" title="Move">${moveLabel}</button>
      <button class="act-btn" onclick="deleteTask('${t.id}')" title="Delete">✕</button>
    </div>
  </div>`;
}

function renderHistory(completed) {
  const el = document.getElementById('history-list');
  if (!completed.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">✓</div><p>Completed tasks will appear here</p></div>`;
    return;
  }
  // Group by month
  const groups = {};
  completed.forEach(c => {
    const d = c.completedAt ? c.completedAt.toDate() : new Date();
    const key = d.toLocaleDateString('en-GB', { month:'long', year:'numeric' });
    if (!groups[key]) groups[key] = [];
    groups[key].push(c);
  });
  el.innerHTML = Object.entries(groups).map(([month, items]) => `
    <div style="margin-bottom:20px">
      <div style="font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px">${month}</div>
      ${items.map(c => `
        <div class="history-item">
          <div class="history-text">${escHtml(c.text)}</div>
          <div class="history-meta">
            <span class="history-date">✓ ${c.completedDate || fmt(c.completedAt)}</span>
            ${c.remark ? `<span class="history-remark">${escHtml(c.remark)}</span>` : ''}
          </div>
        </div>`).join('')}
    </div>`).join('');
}

// ---- NOTES ----
let notes = [], editingNoteId = null;

onSnapshot(query(collection(db,'notes'), orderBy('createdAt','desc')), snap => {
  notes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderNotes();
});

window.saveNewNote = async function() {
  const title = document.getElementById('note-title-input').value.trim();
  const body  = document.getElementById('note-body-input').value.trim();
  if (!body && !title) return;
  document.getElementById('note-title-input').value = '';
  document.getElementById('note-body-input').value = '';
  await addDoc(collection(db,'notes'), { title, body, createdAt: serverTimestamp() });
  showToast('Note saved');
};

window.deleteNote = async function(id) {
  await deleteDoc(doc(db,'notes', id));
  showToast('Note deleted');
};

window.openEditNote = function(id) {
  const note = notes.find(n => n.id === id); if (!note) return;
  editingNoteId = id;
  document.getElementById('note-edit-title').value = note.title || '';
  document.getElementById('note-edit-body').value  = note.body  || '';
  document.getElementById('note-modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('note-edit-body').focus(), 100);
};

window.closeNoteModal = function() {
  document.getElementById('note-modal-bg').classList.remove('open');
  editingNoteId = null;
};

window.confirmEditNote = async function() {
  if (!editingNoteId) return;
  const title = document.getElementById('note-edit-title').value.trim();
  const body  = document.getElementById('note-edit-body').value.trim();
  await updateDoc(doc(db,'notes', editingNoteId), { title, body });
  closeNoteModal();
  showToast('Note updated');
};

document.getElementById('note-modal-bg').addEventListener('click', function(e) {
  if (e.target === this) closeNoteModal();
});

function renderNotes() {
  const el = document.getElementById('notes-list');
  document.getElementById('count-notes').textContent = notes.length;
  if (!notes.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📝</div><p>No notes yet</p></div>`;
    return;
  }
  el.innerHTML = notes.map(n => {
    const date = n.createdAt ? n.createdAt.toDate().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }) : '';
    return `<div class="note-card">
      ${n.title ? `<div class="note-card-title">${escHtml(n.title)}</div>` : ''}
      <div class="note-card-body">${escHtml(n.body || '')}</div>
      <div class="note-card-footer">
        <span class="note-card-date">${date}</span>
        <div class="note-card-actions">
          <button class="act-btn" onclick="openEditNote('${n.id}')" title="Edit">✏️</button>
          <button class="act-btn" onclick="deleteNote('${n.id}')" title="Delete">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ---- UI ----
window.switchTab = function(tab, el) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  el.classList.add('active');
};

// Close modal on bg click
document.getElementById('modal-bg').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

let toastTimer;
window.showToast = function(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
};

// ---- RECURRING ----
let recurringTasks = [];

onSnapshot(query(collection(db,'recurring'), orderBy('createdAt','asc')), snap => {
  recurringTasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderRecurring();
  checkAndSpawnRecurring();
});

window.updateRecurringUI = function() {
  const freq = document.getElementById('rec-freq').value;
  const dayEl = document.getElementById('rec-day');
  dayEl.innerHTML = '';
  if (freq === 'monthly') {
    for (let i = 1; i <= 28; i++) {
      dayEl.innerHTML += `<option value="${i}">${i}${i===1?'st':i===2?'nd':i===3?'rd':'th'} of month</option>`;
    }
  } else {
    const days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
    days.forEach((d,i) => { dayEl.innerHTML += `<option value="${i+1}">${d}</option>`; });
  }
};
updateRecurringUI();

window.addRecurring = async function() {
  const text = document.getElementById('rec-input').value.trim();
  if (!text) return;
  const freq = document.getElementById('rec-freq').value;
  const day  = parseInt(document.getElementById('rec-day').value);
  const section = document.getElementById('rec-section').value;
  document.getElementById('rec-input').value = '';
  await addDoc(collection(db,'recurring'), {
    text, freq, day, section,
    lastSpawned: null,
    createdAt: serverTimestamp()
  });
  showToast('Recurring task added ↻');
};

window.deleteRecurring = async function(id) {
  await deleteDoc(doc(db,'recurring', id));
  showToast('Recurring task removed');
};

function getNextDueDate(r) {
  const now = new Date();
  const d = new Date(now);
  if (r.freq === 'monthly') {
    d.setDate(r.day);
    if (d < now) { d.setMonth(d.getMonth() + 1); d.setDate(r.day); }
  } else {
    // weekly: day 1=Mon ... 7=Sun
    const cur = d.getDay() || 7; // convert Sun=0 to 7
    let diff = r.day - cur;
    if (diff <= 0) diff += 7;
    d.setDate(d.getDate() + diff);
  }
  return d;
}

function isDueToday(r) {
  const now = new Date();
  if (r.freq === 'monthly') {
    return now.getDate() === r.day;
  } else {
    const cur = now.getDay() || 7;
    return cur === r.day;
  }
}

function alreadySpawnedThisPeriod(r) {
  if (!r.lastSpawned) return false;
  const last = r.lastSpawned.toDate ? r.lastSpawned.toDate() : new Date(r.lastSpawned);
  const now = new Date();
  if (r.freq === 'monthly') {
    return last.getMonth() === now.getMonth() && last.getFullYear() === now.getFullYear();
  } else {
    // same ISO week
    const weekOf = d => { const t = new Date(d); t.setHours(0,0,0,0); t.setDate(t.getDate()+3-(t.getDay()+6)%7); const w = new Date(t.getFullYear(),0,4); return 1+Math.round(((t-w)/86400000-3+(w.getDay()+6)%7)/7); };
    return weekOf(last) === weekOf(now) && last.getFullYear() === now.getFullYear();
  }
}

async function checkAndSpawnRecurring() {
  for (const r of recurringTasks) {
    if (isDueToday(r) && !alreadySpawnedThisPeriod(r)) {
      // Check not already in tasks
      const alreadyExists = tasks.some(t => t.recurringId === r.id);
      if (!alreadyExists) {
        await addDoc(collection(db,'tasks'), {
          text: r.text,
          when: r.section,
          recurringId: r.id,
          createdAt: serverTimestamp()
        });
        await updateDoc(doc(db,'recurring', r.id), { lastSpawned: serverTimestamp() });
      }
    }
  }
}

function renderRecurring() {
  const el = document.getElementById('recurring-list');
  document.getElementById('count-recurring').textContent = recurringTasks.length;
  if (!recurringTasks.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">↻</div><p>No recurring tasks yet</p></div>`;
    return;
  }
  el.innerHTML = recurringTasks.map(r => {
    const freqLabel = r.freq === 'monthly'
      ? `Monthly on the ${r.day}${r.day===1?'st':r.day===2?'nd':r.day===3?'rd':'th'}`
      : `Weekly every ${ ['','Mon','Tue','Wed','Thu','Fri','Sat','Sun'][r.day] }`;
    const next = getNextDueDate(r);
    const nextLabel = next.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
    const sectionLabel = { today:'Current', next:'Future', house:'🏠 בית' }[r.section] || 'Current';
    return `<div class="rec-item">
      <span class="rec-icon">↻</span>
      <div class="rec-body">
        <div class="rec-text">${escHtml(r.text)}</div>
        <div class="rec-meta">${freqLabel} → ${sectionLabel}</div>
        <div class="rec-next">Next: ${nextLabel}</div>
      </div>
      <button class="rec-del" onclick="deleteRecurring('${r.id}')">✕</button>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
